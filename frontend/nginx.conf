# ─────────────────────────────────────────────────────────────────
# nginx — Configuración del servidor frontend BravoBot
#
# - Sirve el build estático de Vite en /
# - Hace proxy inverso de /chat, /health, /categorias → backend:8000
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy de la API al contenedor backend ──────────────────────
    # El nombre "backend" viene del service name en docker-compose.yml
    location /chat {
        proxy_pass         http://backend:8000/chat;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /categorias {
        proxy_pass         http://backend:8000/categorias;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Archivos estáticos (SPA fallback) ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Seguridad: ocultar versión de nginx ────────────────────────
    server_tokens off;
}
